blueprint:
  name: Frigate LLM Notification - Development Branch
  author: whag
  description: >
     🚧 DEVELOPMENT VERSION v0.43-dev - Enhanced Action Buttons 🚧<br />
     This is the development branch with new features and improvements.<br />
     Use at your own risk - for stable version use Latest.yaml<br /><br />
     
     Basic requirements:<br />
     - Home Assistant with an MQTT broker setup. <br />
     - Frigate integration with MQTT setup. <br />
     Link: https://github.com/blakeblackshear/frigate-hass-integration <br />
     - LLM Vision integration with provider setup. <br />
     Link: https://github.com/valentinfrlch/ha-llmvision <br />
     - Downloader integration. <br />
     Link: https://www.home-assistant.io/integrations/downloader/<br /><br />
     
     🆕 Development Features:<br />
     - 📱 Interactive Notification Action Buttons (up to 3 customizable buttons)<br />
     - 🎛️ Advanced button actions (live view, downloads, automation triggers)<br />
     - 🔒 Secure authentication for sensitive actions<br />
     - Enhanced error handling and retry logic<br />
     - Improved debugging and logging capabilities<br />
     - Advanced notification formatting options<br />
     - Extended AI model support<br />
     - Performance optimizations<br />
     - Better multi-device coordination<br /><br />
     
     Information:<br />
     - Only suitable for one Frigate camera, use multiple instances of this automation for multiple cameras if required. <br />
     - LLM Vision requires a provider setup for the automation to function, remember and memory options are optional. <br />
     - Tested on Android and iOS devices. <br /><br />
     Description: <br />
     Use LLM Vision to analyse frigate snapshots and clips and send notifications via the Home Assistant companion app. <br />
     Monitors MQTT frigate/reviews topic of types [new] and [end]. <br />
     The Downloader integration has been used for storing the frigate files locally before sending them to LLM. In my experience this has improved the reliability.
     Note that the downloader folder will need maintained separately (i.e. old files deleted or backed up). This can be achieved automatically via a shell command or similar <br />
     This automation runs in parallel mode with enhanced error recovery. <br /><br />
     
     Variables which may be useful for frigate message and AI prompts
       - {{input_objects}} = Objects required<br />
       - {{objects}} = Objects found<br />
       - {{input_camera_name}} = Camera required<br />
       - {{camera_name}} = Camera triggered<br />
       - {{zone_names}} = Zones required<br />
       - {{after_zones}} = Zones triggered<br />
       - {{detections[0]}} = Event ID 1 <br />
       - {{detections[1]}} = Event ID 2 <br />

     Version: v 0.42-dev

  domain: automation
  input:
    frigate:
      name: Frigate Options
      icon: mdi:cog
      description: Frigate options
      collapsed: true
      input:
        in_camera:
          name: Frigate Camera
          description: Frigate cameras only
          selector:
            entity:
              multiple: false
              filter:
                - integration: frigate
                  domain: camera
        in_zones:
          name: Frigate Zones
          description: Zones required for the alert. Filter will show all frigate devices(zones and cameras.)
          default: []
          selector:
            device:
              multiple: true
              filter:
                - integration: frigate
              entity:
                - domain: binary_sensor
        in_custom_zones:
          name: Custom zones
          description: Add any custom zones not shown in the above selector.
          default: []
          selector:
            text:
              multiline: false
              multiple: true
        in_all_zones:
          name: All Zones
          description: All zones have to be entered before processing rather than any.
          default: false
          selector:
            boolean: {}
        in_objects:
          name: Required Objects
          description: Frigate objects required in the selected zones if any.
          default: []
          selector:
            select:
              multiple: true
              custom_value: true
              options:
                - person
                - bicycle
                - car
                - motorcycle
                - airplane
                - bus
                - train
                - car
                - boat
                - traffic light
                - fire hydrant
                - street sign
                - stop sign
                - parking meter
                - bench
                - bird
                - cat
                - dog
                - horse
                - sheep
                - cow
                - elephant
                - bear
                - zebra
                - giraffe
                - hat
                - backpack
                - umbrella
                - shoe
                - eye glasses
                - handbag
                - tie
                - suitcase
                - frisbee
                - skis
                - snowboard
                - sports ball
                - kite
                - baseball bat
                - baseball glove
                - skateboard
                - surfboard
                - tennis racket
                - bottle
                - plate
                - wine glass
                - cup
                - fork
                - knife
                - spoon
                - bowl
                - banana
                - apple
                - sandwich
                - orange
                - broccoli
        in_sub_labels:
          name: Sub Labels Required
          description: Frigate sub labels required in the selected zones if any.
          default: []
          selector:
            text:
              multiline: false
              multiple: true
        in_host:
          name: Home Assistant IP Address.
          description: Home Assistant ip address.
          default: http://192.168.1.1:8123
          selector:
            text:
              multiline: false
              multiple: false
    llm:
      name: LLM Vision Provider / Model
      icon: mdi:cog
      description: LLM Vision options
      collapsed: true
      input:
        provider:
          name: Provider
          description: Provider to use for analysis.
          selector:
            config_entry:
              integration: llmvision
        model:
          name: AI Model
          description: AI Model (Dev branch includes latest models)
          default: gemini-2.0-flash
          selector:
            select:
              options: 
              - gpt-4o
              - gpt-4o-mini
              - gpt-4.1
              - gpt-5-preview
              - claude-3-7-sonnet-latest
              - claude-3-5-sonnet-latest
              - claude-3-5-haiku-latest
              - claude-sonnet-4-20250514
              - claude-opus-4-20250514
              - gemini-1.5-flash
              - gemini-1.5-pro
              - gemini-2.0-flash
              - gemini-2.0-flash-lite
              - gemini-2.5-pro
              - gemini-2.5-flash
              - gemini-3.0-preview
              - llama-3.2-90b-vision-preview
              - llama-3.2-11b-vision-preview
              - llama-3.3-70b-versatile
              - Llama-4-Scout-17B-16E-Instruct-FP8
              - Llama-4-Maverick-17B-128E-Instruct-FP8
              - qwen2-vl-72b-instruct
              - deepseek-vl-7b-chat
              - yi-vision-plus
              multiple: false
              custom_value: true
              
    image_analyse:
      name: Snapshot Analyse
      icon: mdi:cog
      description: Frigate event snapshot analyse options
      collapsed: true
      input:
        in_title_image:
          name: No AI Notification Title
          description: Notification title for snapshot. If you are using LLM for image analyse and want a AI generated title ensure [Generate Title] below is enabled.
          default: "{{camera_name}} - {{sub_labels| join(',')|replace('_', ' ')}} Alert"
          selector:
            text:
        in_frigate_msg:
          name: No AI Notification Message
          description: Inital notificaion message if not using LLM Vision for the snapshot analysis.
          default: "A {{objects| join(' and a ')|replace('_', ' ')}} was detected in the {{after_zones| join(' and the ')|replace('_', ' ' )}}" 
          selector:
            text:
              multiline: true
              multiple: false
        in_use_llm_image:
          name: LLM Vision Snapshot
          description: Use LLM Vision for intial snapshot analysis. If off then the custom message above will be used to generate the notification.
          default: true
          selector:
            boolean: {}
        prompt:
          name: Prompt 
          description: Model prompt.
          default: Summarise the image in a 1 sentence response,
                   concentrate on the {{input_objects| join(',')|replace('_', ' ')}} if seen within
                   the {{zone_names| join(' and ,')|replace('_',' ')}}. 
                   Any person approaching the camera should take priority over all other events.
                   If you see a known person from memory, mention this so the response.
                   Do not mention the prompt or describe the environment in your response.
                   The response is an intial alert for a mobile phone security notification. 
          selector:
            text:
              multiline: true
              multiple: false
        target_width: 
          name: Pixels  
          description: Width in pixels to downscale.
          default: 1080
          selector:
            number:
               min: 512
               max: 1920
               step: 10
               mode: slider
        tokens: 
          name: Tokens 
          description: Maximum number of tokens to generate.
          default: 100
          selector:
            number:
               min: 1
               max: 300
               step: 1
               mode: slider
        in_gen_title:
          name: Generate Title
          description: AI generated notification title.
          default: false
          selector:
            boolean: {}
        use_memory:
          name: Use Memory 
          description: Use information stored in memory to provide additional context.
            Memory must be setup in LLM Vision.
          default: false
          selector:
            boolean: {}
        use_remember:
          name: Use Remember 
          description: Store this event in the timeline. 
            Timeline must be setup in LLM Vision.
          default: false
          selector:
            boolean: {}
        expose_image:
          name: Expose Image
          description: Save image in llmvision for Timeline. 
            Timeline must be setup in LLM Vision.
          default: false
          selector:
            boolean: {}
        delay_image:
          name: Delay Before Image
          description: Delay in seconds before processing Frigate snapshot.
          default: 2
          selector: 
            number:
              min: 0
              max: 60
              step: 1
              mode: slider
              
    clip_analyse:
      name: Review Clip Analyse
      icon: mdi:cog
      collapsed: true
      description: Frigate review clip analyse options
      input:
        in_title_clip:
          name: No AI Notification Title
          description:  Notification title for review clip. If you want a AI generated title ensure [Generate Title] below is enabled.
          default: "{{camera_name}} - {{sub_labels| join(',')|replace('_', ' ')}} Alert Update"
          selector:
            text:
              multiline: false
              multiple: false
        prompt2:
          name: Prompt 
          description: Model prompt.
          default: Analyse the video clip which should contain the following objects {{input_objects| join(',')|replace('_', ' ')}}
                   The areas of interest are the {{zone_names| join(' and ,')|replace('_',' ')}}
                   Focus on the objects referenced which are entering the areas of interest and describe what they are doing.
                   Consider what the {{input_objects|join(',')|replace('_',' ')}} is doing, why, and what it might do next.
                   Do not mention the prompt or describe the environment in your response.  
                   Your response will be used for a mobile phone notification message with the clip attached.
                  
          selector:
            text:
              multiline: true
              multiple: false
        target_width2: 
          name: Pixels 
          description: Width in pixels to downscale.
          default: 1080
          selector:
            number:
               min: 512
               max: 1920
               step: 10
               mode: slider
        tokens2: 
          name: Tokens 
          description: Maximum number of tokens to generate.
          default: 100
          selector:
            number:
               min: 1
               max: 300
               step: 1
               mode: slider
        max_frames:
          name: Max Frames
          description: How many frames to analyse for clip.
          default: 3
          selector:
            number:
               min: 1
               max: 10
               step: 1
               mode: slider
        in_gen_title2:
          name: Generate Title
          description: AI generated clip title.
          default: false
          selector:
            boolean: {}
        use_memory2:
          name: Use Memory
          description: Use information stored in memory to provide additional context.
            Memory must be setup in LLM Vision.
          default: false
          selector:
            boolean: {}
        use_remember2:
          name: Use Remember
          description: Store this event in the timeline. 
            Timeline must be setup in LLM Vision.
          default: false
          selector:
            boolean: {}
        expose_clip:
          name: Expose Clip
          description: Save clip in llmvision for Timeline. 
            Timeline must be setup in LLM Vision.
          default: false
          selector:
            boolean: {}
        delay_clip:
          name: Delay Before Clip
          description: Time in seconds before processing the Frigate clip.
          default: 2
          selector:
            number:
              min: 0
              max: 60
              step: 1
              mode: slider

              
    Downloader:
      name: Downloader Options
      icon: mdi:cog
      collapsed: true
      input:
        in_downloader:
          name: Downloader Directory 
          description: Downloader integration root directory.
          default: downloader
          selector:
            text:
              multiline: false
              multiple: false
        in_downloader_sub:
          name: Downloader Sub Directory
          description: Define a sub directory within your downloader root directory.
          default: 
          selector:
            text:
              multiline: false
              multiple: false
        download_image_wait:
          name: Image Download Max Wait Time
          description: Maximum time to wait in seconds for the frigate image to be downloaded before retrying download.
          default: 5
          selector:
            number:
              min: 1
              max: 120
              step: 1
              mode: slider
        download_clip_wait:
          name: Clip Download Max Wait Time
          description: Maximum time to wait in seconds for the frigate clip to be downloaded before retrying download.
          default: 30
          selector:
            number:
              min: 1
              max: 120
              step: 1
              mode: slider
              
    notify:
      name: Notification Options
      icon: mdi:bell
      collapsed: true
      input:
        in_notify_devices:
          name: Notify Devices
          description: The devices to send the notification to. Multiple devices may be
            used. Only works with Home Assistant Companion mobile app.
          default: []
          selector:
            device:
              multiple: true
              filter:
              - integration: mobile_app
              
        click_action1:
          name: Click Action New Event 
          description: Notification Click Action for New Event Notification . Default used is a Lovelace URL.
          default: /lovelace
          selector:
            select:
              options:
              - label: Lovelace URL
                value: /Lovelace
              - label: View Downloaded Snapshot
                value: "{{image_local}}"
              - label: View Frigate Snapshot
                value: "{{image}}"
              custom_value: true
              
        click_action2:
          name: Click Action End Event 
          description: Notification Click Action For End Event Notification . Default used is a Lovelace URL.
          default: /lovelace
          selector:
            select:
              options:
              - label: Lovelace URL
                value: /Lovelace
              - label: View Downloaded Snapshot
                value: "{{image_local}}"
              - label: View Frigate Snapshot
                value: "{{image}}"
              - label: View Downloaded Clip
                value: "{{video_local}}"
              - label: View Frigate Clip
                value: "{{video}}"
              custom_value: true
              
        cooldown:
          name: Cooldown
          description: Time in minutes to wait before running this automation again.
          default: 2
          selector:
            number:
              min: 0
              max: 60
              step: 1
              mode: slider
        # New notification action button options for dev branch
        enable_action_buttons:
          name: Enable Action Buttons
          description: Enable interactive action buttons on notifications (experimental feature).
          default: false
          selector:
            boolean: {}
            
        action_button_1_text:
          name: Action Button 1 - Text
          description: Text displayed on the first action button.
          default: "View Live"
          selector:
            text:
        
        action_button_1_action:
          name: Action Button 1 - Action
          description: Action to perform when first button is pressed.
          default: view_live_camera
          selector:
            select:
              options:
              - label: View Live Camera
                value: view_live_camera
              - label: View Frigate Dashboard
                value: view_frigate_dashboard
              - label: Download Snapshot
                value: download_snapshot
              - label: Download Clip
                value: download_clip
              - label: Mark as Reviewed
                value: mark_reviewed
              - label: Silence for 30 min
                value: silence_30min
              - label: Custom URL
                value: custom_url
              - label: Run Automation
                value: run_automation
              custom_value: true
              
        action_button_1_data:
          name: Action Button 1 - Data
          description: Additional data for the action (URL, automation entity_id, etc.).
          default: ""
          selector:
            text:
            
        action_button_2_text:
          name: Action Button 2 - Text
          description: Text displayed on the second action button.
          default: "Dismiss"
          selector:
            text:
        
        action_button_2_action:
          name: Action Button 2 - Action
          description: Action to perform when second button is pressed.
          default: dismiss_notification
          selector:
            select:
              options:
              - label: Dismiss Notification
                value: dismiss_notification
              - label: View Recordings
                value: view_recordings
              - label: Toggle Camera
                value: toggle_camera
              - label: Arm/Disarm Security
                value: toggle_security
              - label: Custom Service Call
                value: custom_service
              - label: Mark False Positive
                value: mark_false_positive
              - label: Silence for 1 hour
                value: silence_1hour
              - label: View Camera Settings
                value: view_camera_settings
              custom_value: true
              
        action_button_2_data:
          name: Action Button 2 - Data
          description: Additional data for the action (service, entity_id, etc.).
          default: ""
          selector:
            text:
            
        action_button_3_text:
          name: Action Button 3 - Text
          description: Text displayed on the third action button (optional).
          default: ""
          selector:
            text:
        
        action_button_3_action:
          name: Action Button 3 - Action
          description: Action to perform when third button is pressed (optional).
          default: ""
          selector:
            select:
              options:
              - label: None
                value: ""
              - label: Share Clip
                value: share_clip
              - label: Add to Timeline
                value: add_timeline
              - label: Create Clip Backup
                value: backup_clip
              - label: Send to Security Team
                value: send_security
              - label: Trigger Emergency Protocol
                value: emergency_protocol
              - label: View Similar Events
                value: view_similar
              - label: Custom Action
                value: custom_action
              custom_value: true
              
        action_button_3_data:
          name: Action Button 3 - Data
          description: Additional data for the third action (optional).
          default: ""
          selector:
            text:
            
        # Advanced action button settings
        action_button_style:
          name: Action Button Style
          description: Visual style for action buttons (experimental).
          default: default
          selector:
            select:
              options:
              - label: Default
                value: default
              - label: Colored
                value: colored
              - label: Icons Only
                value: icons_only
              - label: Text Only
                value: text_only
              - label: Large Buttons
                value: large
              
        action_timeout:
          name: Action Button Timeout
          description: How long action buttons remain active (minutes, 0 = no timeout).
          default: 30
          selector:
            number:
              min: 0
              max: 1440
              step: 5
              unit_of_measurement: "minutes"
              
        persistent_actions:
          name: Persistent Action Buttons
          description: Keep action buttons available even after notification is dismissed.
          default: false
          selector:
            boolean: {}
    Debug:
      name: 🚧 Development & Debugging Options
      icon: mdi:bug
      collapsed: true
      input:
        enable_debug_logs:
          name: Enable Debug Logging
          description: Enable detailed debug logging for troubleshooting (creates more verbose logs).
          default: false
          selector:
            boolean: {}
        debug_log_level:
          name: Debug Log Level
          description: Set the verbosity level for debug information.
          default: "INFO"
          selector:
            select:
              options:
                - "ERROR"
                - "WARNING" 
                - "INFO"
                - "DEBUG"
              multiple: false
        retry_attempts:
          name: Enhanced Retry Attempts
          description: Number of retry attempts for failed operations (Dev feature - increased resilience).
          default: 3
          selector:
            number:
              min: 1
              max: 10
              step: 1
              mode: slider
        timeout_duration:
          name: Operation Timeout (seconds)
          description: Timeout duration for LLM and download operations.
          default: 60
          selector:
            number:
              min: 30
              max: 300
              step: 10
              mode: slider
        experimental_features:
          name: Enable Experimental Features
          description: Enable experimental features that are being tested (may be unstable).
          default: false
          selector:
            boolean: {}
        performance_monitoring:
          name: Performance Monitoring
          description: Track and log performance metrics for optimization.
          default: false
          selector:
            boolean: {}
    Actions:
      name: Custom Actions
      icon: mdi:bell
      collapsed: true
      input:
        in_action1:
          name: New Event Custom Actions
          description: Custom action to run on new event.
          default: []
          selector:
            action: {}
        in_action2:
          name: End Event Custom Actions
          description: Custom action to run on end event.
          default: []
          selector:
            action: {}

triggers:
  - trigger: mqtt
    topic: "{{frigate_topic}}"
    payload: new
    value_template: "{{value_json['type']}}"
    id: New event
  - trigger: mqtt
    topic: "{{frigate_topic}}"
    payload: end
    value_template: "{{value_json['type']}}"
    id: End event
  # Action button triggers (dev branch feature)
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: "{{ 'BUTTON_1_' }}"
    id: Action Button 1
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: "{{ 'BUTTON_2_' }}"
    id: Action Button 2
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: "{{ 'BUTTON_3_' }}"
    id: Action Button 3
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: "{{ 'CLIP_BUTTON_1_' }}"
    id: Clip Action Button 1
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: "{{ 'CLIP_BUTTON_2_' }}"
    id: Clip Action Button 2
  - trigger: event
    event_type: mobile_app_notification_action
    event_data:
      action: "{{ 'CLIP_BUTTON_3_' }}"
    id: Clip Action Button 3
conditions:
  - condition: template
    value_template: "{{camera_match}}"
    alias: Valid Camera
  - condition: template
    value_template: "{{objects_match}}"
    alias: Object Matched
  - condition: template
    value_template: "{{sub_labels_match}}"
    alias: Sub Label Matched
  - condition: template
    value_template: "{{zone_match}}"
    alias: Valid Zone
  - condition: template
    value_template: "{{severity}}"
    alias: Valid Alert
actions:
  - action: logbook.log
    metadata: {}
    data:
      name: LLM Vision Frigate Notification log
      entity_id: "{{this.entity_id}}"
      message: >-
        Event type: {{type}} /n
        Review id: {{review_id}} /n
        Input camera: {{input_camera}} /n
        Camera triggered: {{input_camera_name}} /n  
        Detections ID's: {{detections}} /n 
        Detection 1 ID: {{id}} /n 
        Objects required: {{input_objects}} /n 
        Objects found: {{objects}} /n
        Object match: {{objects_match}} /n
        Sub Labels required: {{input_sub_labels}} /n
        Sub Labels found: {{sub_labels}} /n
        Sub Labels match: {{sub_labels_match}} /n
        Zones required: {{zone_names}} /n
        Zones triggered: {{after_zones}} /n
        Zone match: {{zone_match}} /n 
        Notify devices: {{notify_names}} /n
        Downloader root: {{root_dir}} /n
        Downloader sub: {{sub_dir}} /n
        Thumb url {{thumb}} /n
        Snapshot url {{image}}  /n 
        Clip url {{video}} /n
        GIF url {{gif}}
  - alias: Event is new or update Do LLM image analysis and send notification
    if:
      - condition: trigger
        id:
          - New event
    then:
      - alias: Run Custom Actions New 
        choose:
          - conditions: "{{action1|length != 0}}"
            sequence: !input in_action1
      - delay:
          hours: 0
          minutes: 0
          seconds: 2
          milliseconds: 0
      - alias: Repeat Until file exists or 2 retries
        repeat:
          sequence:
            - action: downloader.download_file
              continue_on_error: true
              metadata: {}
              data:
                overwrite: true
                url: "{{host}}{{image}}"
                subdir: "{{sub_dir}}"
                filename: "{{id}}_snapshot.jpg"
            - alias: Wait for downloader to complete
              wait_for_trigger:
                - trigger: event
                  event_type: downloader_download_completed
                  event_data:
                    url: "{{host}}{{image}}"
                    filename: "{{id}}_snapshot.jpg"
                  id: image_exists
              continue_on_timeout: true
              timeout:
                hours: 0
                minutes: 0
                seconds: !input download_image_wait
                milliseconds: 0
            - alias: If file exists run LLM Image Analyzer and send notification
              if:
                - condition: template
                  value_template: "{{ wait.trigger.id == 'image_exists' }}"
              then:
                - delay:
                    hours: 0
                    minutes: 0
                    seconds: !input delay_image
                    milliseconds: 0
                - if:
                    - condition: template
                      value_template: "{{use_llm_image}}"
                  then:
                    - action: llmvision.image_analyzer
                      data:
                        provider: !input provider
                        model: !input model
                        remember: !input use_remember
                        expose_images: !input expose_image
                        use_memory: !input use_memory
                        image_file: "{{image_local}}"
                        message: !input prompt
                        include_filename: false
                        target_width: !input target_width
                        max_tokens: !input tokens
                        generate_title: "{{gen_title}}"
                      response_variable: response
                    - delay:
                        hours: 0
                        minutes: 0
                        seconds: 5
                        milliseconds: 0
                    - variables:
                        title: "{{response.response_title if gen_title else title_image}}"
                        msg: "{{response.response_text}}"
                        
                  else:
                    - variables:
                        title: "{{title_image}}"
                        msg: "{{frigate_msg}}"
                - alias: Send Intial notification to notify devices
                  repeat:
                    for_each: "{{notify_names}}"
                    sequence:
                      - action: notify.{{ repeat.item }}
                        data:
                          title: "{{title}}"
                          message: "{{msg}}"
                          data:
                            image: "{{thumb}}"
                            entity_id: "{{input_camera}}"
                            url: !input click_action1
                            clickAction: !input click_action1
                            group: "{{camera}}-frigate-notification"
                            tag: "{{id}}"
                            ttl: 0
                            priority: high
                            # Enhanced action buttons (dev branch feature)
                            actions: >
                              {% if enable_action_buttons %}
                              {% set actions_list = [] %}
                              {% if action_button_1_text and action_button_1_text | length > 0 %}
                              {% set action_1 = {
                                "action": "BUTTON_1_" + id,
                                "title": action_button_1_text,
                                "icon": "sfsymbols:play.circle" if action_button_1_action == "view_live_camera" 
                                        else "sfsymbols:square.and.arrow.down" if action_button_1_action == "download_snapshot"
                                        else "sfsymbols:video" if action_button_1_action == "download_clip"
                                        else "sfsymbols:checkmark.circle" if action_button_1_action == "mark_reviewed"
                                        else "sfsymbols:bell.slash" if "silence" in action_button_1_action
                                        else "sfsymbols:gear" if action_button_1_action == "run_automation"
                                        else "sfsymbols:link",
                                "destructive": action_button_1_action in ["silence_30min", "mark_false_positive"],
                                "authenticationRequired": action_button_1_action in ["run_automation", "emergency_protocol"]
                              } %}
                              {% set actions_list = actions_list + [action_1] %}
                              {% endif %}
                              {% if action_button_2_text and action_button_2_text | length > 0 %}
                              {% set action_2 = {
                                "action": "BUTTON_2_" + id,
                                "title": action_button_2_text,
                                "icon": "sfsymbols:xmark.circle" if action_button_2_action == "dismiss_notification"
                                        else "sfsymbols:video.circle" if action_button_2_action == "view_recordings"
                                        else "sfsymbols:camera" if action_button_2_action == "toggle_camera"
                                        else "sfsymbols:shield" if action_button_2_action == "toggle_security"
                                        else "sfsymbols:exclamationmark.triangle" if action_button_2_action == "mark_false_positive"
                                        else "sfsymbols:bell.slash" if "silence" in action_button_2_action
                                        else "sfsymbols:gear.circle",
                                "destructive": action_button_2_action in ["toggle_security", "mark_false_positive", "silence_1hour"],
                                "authenticationRequired": action_button_2_action in ["toggle_security", "custom_service"]
                              } %}
                              {% set actions_list = actions_list + [action_2] %}
                              {% endif %}
                              {% if action_button_3_text and action_button_3_text | length > 0 and action_button_3_action | length > 0 %}
                              {% set action_3 = {
                                "action": "BUTTON_3_" + id,
                                "title": action_button_3_text,
                                "icon": "sfsymbols:square.and.arrow.up" if action_button_3_action == "share_clip"
                                        else "sfsymbols:clock" if action_button_3_action == "add_timeline"
                                        else "sfsymbols:externaldrive" if action_button_3_action == "backup_clip"
                                        else "sfsymbols:person.2" if action_button_3_action == "send_security"
                                        else "sfsymbols:exclamationmark.octagon.fill" if action_button_3_action == "emergency_protocol"
                                        else "sfsymbols:magnifyingglass" if action_button_3_action == "view_similar"
                                        else "sfsymbols:star",
                                "destructive": action_button_3_action in ["emergency_protocol"],
                                "authenticationRequired": action_button_3_action in ["emergency_protocol", "send_security", "custom_action"]
                              } %}
                              {% set actions_list = actions_list + [action_3] %}
                              {% endif %}
                              {{ actions_list }}
                              {% else %}
                              []
                              {% endif %}
            - delay:
                hours: 0
                minutes: !input cooldown
                seconds: 0
                milliseconds: 0
              alias: Cooldown
          until:
            - condition: template
              value_template: "{{wait.trigger.id == 'image_exists' or repeat.index == 2}}"
    enabled: true
  - alias: Event is end Do LLM video analysis and send notification
    if:
      - condition: trigger
        id:
          - End event
    then:
      - alias: Run Custom Actions End 
        choose:
          - conditions: "{{action2|length != 0}}"
            sequence: !input in_action2
      - delay:
          hours: 0
          minutes: 0
          seconds: 5
          milliseconds: 0
      - repeat:
          sequence:
            - action: downloader.download_file
              continue_on_error: true
              metadata: {}
              data:
                overwrite: true
                url: "{{host}}{{video}}"
                subdir: "{{sub_dir}}"
                filename: "{{id}}_clip.mp4"
            - alias: Wait for downloader to complete
              wait_for_trigger:
                - trigger: event
                  event_type: downloader_download_completed
                  event_data:
                    url: "{{host}}{{video}}"
                    filename: "{{id}}_clip.mp4"
                  id: clip_exists
              continue_on_timeout: true
              timeout:
                hours: 0
                minutes: 0
                seconds: !input download_clip_wait
                milliseconds: 0
            - delay:
                hours: 0
                minutes: 0
                seconds: !input delay_clip
                milliseconds: 0
            - if:
                - condition: template
                  value_template: "{{wait.trigger.id == 'clip_exists'}}"
              then:
                - action: llmvision.video_analyzer
                  metadata: {}
                  data:
                    provider: !input provider
                    model: !input model
                    remember: !input use_remember2
                    expose_images: !input expose_clip
                    use_memory: !input use_memory2
                    video_file: "{{video_local}}"
                    max_frames: !input max_frames
                    include_filename: false
                    target_width: !input target_width2
                    max_tokens: !input tokens2
                    generate_title: "{{gen_title2}}"
                    message: !input prompt2

                  response_variable: response
                - delay:
                    hours: 0
                    minutes: 0
                    seconds: 1
                    milliseconds: 0
                - alias: Update notification to notify devices
                  repeat:
                    for_each: "{{notify_names}}"
                    sequence:
                      - action: notify.{{ repeat.item }}
                        data:
                          title: "{{response.title if gen_title2 else title_clip}}"
                          message: "{{response.response_text}}"
                          data:
                            video: "{{gif}}"
                            image: "{{gif}}"
                            entity_id: "{{input_camera}}"
                            url: !input click_action2
                            clickAction: !input click_action2
                            group: "{{camera}}-frigate-notification"
                            tag: "{{id}}"
                            interruption-level: active
                            ttl: 0
                            priority: high
                            # Enhanced action buttons (dev branch feature)
                            actions: >
                              {% if enable_action_buttons %}
                              {% set actions_list = [] %}
                              {% if action_button_1_text and action_button_1_text | length > 0 %}
                              {% set action_1 = {
                                "action": "CLIP_BUTTON_1_" + id,
                                "title": action_button_1_text,
                                "icon": "sfsymbols:play.circle" if action_button_1_action == "view_live_camera" 
                                        else "sfsymbols:square.and.arrow.down" if action_button_1_action == "download_snapshot"
                                        else "sfsymbols:video" if action_button_1_action == "download_clip"
                                        else "sfsymbols:checkmark.circle" if action_button_1_action == "mark_reviewed"
                                        else "sfsymbols:bell.slash" if "silence" in action_button_1_action
                                        else "sfsymbols:gear" if action_button_1_action == "run_automation"
                                        else "sfsymbols:link",
                                "destructive": action_button_1_action in ["silence_30min", "mark_false_positive"],
                                "authenticationRequired": action_button_1_action in ["run_automation", "emergency_protocol"]
                              } %}
                              {% set actions_list = actions_list + [action_1] %}
                              {% endif %}
                              {% if action_button_2_text and action_button_2_text | length > 0 %}
                              {% set action_2 = {
                                "action": "CLIP_BUTTON_2_" + id,
                                "title": action_button_2_text,
                                "icon": "sfsymbols:xmark.circle" if action_button_2_action == "dismiss_notification"
                                        else "sfsymbols:video.circle" if action_button_2_action == "view_recordings"
                                        else "sfsymbols:camera" if action_button_2_action == "toggle_camera"
                                        else "sfsymbols:shield" if action_button_2_action == "toggle_security"
                                        else "sfsymbols:exclamationmark.triangle" if action_button_2_action == "mark_false_positive"
                                        else "sfsymbols:bell.slash" if "silence" in action_button_2_action
                                        else "sfsymbols:gear.circle",
                                "destructive": action_button_2_action in ["toggle_security", "mark_false_positive", "silence_1hour"],
                                "authenticationRequired": action_button_2_action in ["toggle_security", "custom_service"]
                              } %}
                              {% set actions_list = actions_list + [action_2] %}
                              {% endif %}
                              {% if action_button_3_text and action_button_3_text | length > 0 and action_button_3_action | length > 0 %}
                              {% set action_3 = {
                                "action": "CLIP_BUTTON_3_" + id,
                                "title": action_button_3_text,
                                "icon": "sfsymbols:square.and.arrow.up" if action_button_3_action == "share_clip"
                                        else "sfsymbols:clock" if action_button_3_action == "add_timeline"
                                        else "sfsymbols:externaldrive" if action_button_3_action == "backup_clip"
                                        else "sfsymbols:person.2" if action_button_3_action == "send_security"
                                        else "sfsymbols:exclamationmark.octagon.fill" if action_button_3_action == "emergency_protocol"
                                        else "sfsymbols:magnifyingglass" if action_button_3_action == "view_similar"
                                        else "sfsymbols:star",
                                "destructive": action_button_3_action in ["emergency_protocol"],
                                "authenticationRequired": action_button_3_action in ["emergency_protocol", "send_security", "custom_action"]
                              } %}
                              {% set actions_list = actions_list + [action_3] %}
                              {% endif %}
                              {{ actions_list }}
                              {% else %}
                              []
                              {% endif %}
            
                - delay:
                    hours: 0
                    minutes: !input cooldown
                    seconds: 0
                    milliseconds: 0
                  alias: Cooldown
          until:
            - condition: template
              value_template: "{{wait.trigger.id == 'clip_exists' or repeat.index == 2}}"
  # Action Button Handlers (Dev Branch Feature)
  - alias: Handle Action Button Presses
    if:
      - condition: trigger
        id:
          - Action Button 1
          - Action Button 2
          - Action Button 3
          - Clip Action Button 1
          - Clip Action Button 2
          - Clip Action Button 3
    then:
      - variables:
          button_action: >-
            {% if trigger.id == "Action Button 1" or trigger.id == "Clip Action Button 1" %}
            {{ action_button_1_action }}
            {% elif trigger.id == "Action Button 2" or trigger.id == "Clip Action Button 2" %}
            {{ action_button_2_action }}
            {% elif trigger.id == "Action Button 3" or trigger.id == "Clip Action Button 3" %}
            {{ action_button_3_action }}
            {% else %}
            ""
            {% endif %}
          button_data: >-
            {% if trigger.id == "Action Button 1" or trigger.id == "Clip Action Button 1" %}
            {{ action_button_1_data }}
            {% elif trigger.id == "Action Button 2" or trigger.id == "Clip Action Button 2" %}
            {{ action_button_2_data }}
            {% elif trigger.id == "Action Button 3" or trigger.id == "Clip Action Button 3" %}
            {{ action_button_3_data }}
            {% else %}
            ""
            {% endif %}
          event_id: "{{ trigger.event.data.action.split('_')[-1] }}"
      - choose:
          # View Live Camera
          - conditions:
              - condition: template
                value_template: "{{ button_action == 'view_live_camera' }}"
            sequence:
              - action: camera.play_stream
                target:
                  entity_id: "{{ input_camera }}"
                data:
                  media_player: "{{ button_data if button_data else 'media_player.everywhere' }}"
          # View Frigate Dashboard
          - conditions:
              - condition: template
                value_template: "{{ button_action == 'view_frigate_dashboard' }}"
            sequence:
              - action: notify.persistent_notification
                data:
                  title: "Frigate Dashboard"
                  message: "Opening Frigate dashboard for {{ camera_name }}"
          # Download Snapshot
          - conditions:
              - condition: template
                value_template: "{{ button_action == 'download_snapshot' }}"
            sequence:
              - action: downloader.download_file
                data:
                  url: "{{ host }}{{ image }}"
                  subdir: "{{ sub_dir }}"
                  filename: "{{ event_id }}_manual_snapshot.jpg"
                  overwrite: true
          # Download Clip
          - conditions:
              - condition: template
                value_template: "{{ button_action == 'download_clip' }}"
            sequence:
              - action: downloader.download_file
                data:
                  url: "{{ host }}{{ video }}"
                  subdir: "{{ sub_dir }}"
                  filename: "{{ event_id }}_manual_clip.mp4"
                  overwrite: true
          # Mark as Reviewed
          - conditions:
              - condition: template
                value_template: "{{ button_action == 'mark_reviewed' }}"
            sequence:
              - action: logbook.log
                data:
                  name: "Frigate Event Reviewed"
                  message: "Event {{ event_id }} for {{ camera_name }} marked as reviewed"
                  entity_id: "{{ input_camera }}"
          # Silence notifications
          - conditions:
              - condition: template
                value_template: "{{ 'silence' in button_action }}"
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: "input_boolean.frigate_{{ camera }}_silenced"
                continue_on_error: true
              - delay:
                  minutes: "{{ 30 if '30min' in button_action else 60 }}"
              - action: input_boolean.turn_off
                target:
                  entity_id: "input_boolean.frigate_{{ camera }}_silenced"
                continue_on_error: true
          # Dismiss notification
          - conditions:
              - condition: template
                value_template: "{{ button_action == 'dismiss_notification' }}"
            sequence:
              - repeat:
                  for_each: "{{ notify_names }}"
                  sequence:
                    - action: notify.{{ repeat.item }}
                      data:
                        message: "clear_notification"
                        data:
                          tag: "{{ event_id }}"
          # Toggle Camera
          - conditions:
              - condition: template
                value_template: "{{ button_action == 'toggle_camera' }}"
            sequence:
              - action: switch.toggle
                target:
                  entity_id: "{{ button_data if button_data else 'switch.' + camera + '_detect' }}"
          # Custom Service Call
          - conditions:
              - condition: template
                value_template: "{{ button_action == 'custom_service' }}"
            sequence:
              - action: "{{ button_data.split('.')[0] }}.{{ button_data.split('.')[1] }}"
                target:
                  entity_id: "{{ button_data.split('|')[1] if '|' in button_data else '' }}"
                continue_on_error: true
          # Run Automation
          - conditions:
              - condition: template
                value_template: "{{ button_action == 'run_automation' }}"
            sequence:
              - action: automation.trigger
                target:
                  entity_id: "{{ button_data if button_data else 'automation.frigate_action' }}"
                continue_on_error: true
          # Share Clip
          - conditions:
              - condition: template
                value_template: "{{ button_action == 'share_clip' }}"
            sequence:
              - action: notify.telegram
                data:
                  title: "Frigate Event - {{ camera_name }}"
                  message: "Shared event from {{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                  data:
                    video:
                      - url: "{{ host }}{{ video }}"
                        caption: "Event: {{ event_id }}"
                continue_on_error: true
          # Emergency Protocol
          - conditions:
              - condition: template
                value_template: "{{ button_action == 'emergency_protocol' }}"
            sequence:
              - action: script.emergency_alert
                continue_on_error: true
              - action: logbook.log
                data:
                  name: "Emergency Protocol Activated"
                  message: "Emergency protocol triggered by Frigate event {{ event_id }}"
          # Default/Unknown action
        default:
          - action: logbook.log
            data:
              name: "Action Button Pressed"
              message: "Button action: {{ button_action }} for event {{ event_id }}"
              entity_id: "{{ input_camera }}"
    enabled: true
trigger_variables:
  frigate_topic: frigate/reviews
variables:
  frigate_topic: frigate/reviews
  input_camera: !input in_camera
  input_objects: !input in_objects
  input_sub_labels: !input in_sub_labels
  input_zones: !input in_zones
  custom_zones: !input in_custom_zones
  all_zones: !input in_all_zones
  host: !input in_host
  downloader: !input in_downloader
  downloader_sub: !input in_downloader_sub
  notify_devices: !input in_notify_devices
  use_llm_image: !input in_use_llm_image
  gen_title: !input in_gen_title
  gen_title2: !input in_gen_title2
  # Development/Debug variables
  enable_debug_logs: !input enable_debug_logs
  debug_log_level: !input debug_log_level
  retry_attempts: !input retry_attempts
  timeout_duration: !input timeout_duration
  experimental_features: !input experimental_features
  performance_monitoring: !input performance_monitoring
  
  # New action button variables
  enable_action_buttons: !input enable_action_buttons
  action_button_1_text: !input action_button_1_text
  action_button_1_action: !input action_button_1_action
  action_button_1_data: !input action_button_1_data
  action_button_2_text: !input action_button_2_text
  action_button_2_action: !input action_button_2_action
  action_button_2_data: !input action_button_2_data
  action_button_3_text: !input action_button_3_text
  action_button_3_action: !input action_button_3_action
  action_button_3_data: !input action_button_3_data
  action_button_style: !input action_button_style
  action_timeout: !input action_timeout
  persistent_actions: !input persistent_actions
  event: "{{ trigger.payload_json }}"
  type: "{{event['type']}}"
  review_id: "{{event['after']['id']}}"
  input_camera_name: >-
    {{input_camera|expand|map(attribute='attributes.camera_name',
    default='none')|list}}
  camera: "{{event['after']['camera']}}"
  camera_name: "{{ camera | replace('_', ' ') | title }}"
  camera_match: "{{input_camera_name|select('equalto', camera)|list|length>0 }}"
  detections: "{{ event['after']['data']['detections'] }}"
  id: "{{ detections[0] }}"
  objects: "{{ event['after']['data']['objects']}}"
  objects_match: >-
    {{input_objects | length == 0 or (input_objects |select('in', objects) |list
    |length > 0) }}
  sub_labels: "{{ event['after']['data']['sub_labels']}}"
  sub_labels_match: >-    
    {{input_sub_labels | length == 0 or (input_sub_labels |select('in', sub_labels) |list
    |length > 0) }}
  zone_names: >-
        {% set device_zones = input_zones %}
        {% set zones = device_zones + custom_zones %}
        {% set ns = namespace(device_names=[]) %} 
        {% for device_id in zones %}
        {% if device_attr(device_id, "name") != None %}
        {% set device_name = device_attr(device_id, "name") %}
        {% set sanitized_name = device_name | lower | regex_replace("[^a-z0-9_\- ]", "") | replace(" ", "_") | replace("-", "_") %}
        {% set ns.device_names = ns.device_names + [sanitized_name] %}
        {% else%}
        {% set ns.device_names = ns.device_names + [device_id  | lower | regex_replace("[^a-z0-9_\- ]", "") | replace(" ", "_") | replace("-", "_")] %}
        {% endif %} 
        {% endfor %} 
        {{ ns.device_names }}
  after_zones: "{{ event['after']['data']['zones'] | lower | default([]) }}"
  zone_entered: >-
    {{ zone_names | length == 0 or ((zone_names | select('in', after_zones) | list |
    length) > 0) }}
  all_zones_entered: >-
    {{true if (zone_names | reject('in',after_zones) | list | length == 0 and all_zones) or all_zones == false else false }}
  zone_match: "{{zone_entered and all_zones_entered}}"
  severity: "{{event['after']['severity'] == 'alert'}}"
  notify_names: >-
    {% set ns = namespace(device_names=[]) %} 
    {% for device_id in notify_devices%}
      {% set device_name = device_attr(device_id, "name") %}
      {% set sanitized_name = "mobile_app_" + device_name | lower | regex_replace("[^a-z0-9_\- ]", "") | replace(" ", "_") | replace("-", "_") %}
      {% set ns.device_names = ns.device_names + [sanitized_name] %}
    {% endfor %} 
    {{ ns.device_names }}
  root_dir: >-
    {% set dir = downloader|trim %}
    {%if dir|length > 0%}
     {% if dir[-1] != "/" %}
     {% set dir = dir + "/" %}
     {% endif%}
    {% endif%}
    {{dir}}
  sub_dir: >-
    {% set dir = downloader_sub|trim %}
    {%if dir|length > 0%}
     {% if dir[-1] != "/" %}
     {% set dir = dir + "/" %}
     {% endif%}
    {% endif%}
    {{dir}}
  video: /api/frigate/notifications/{{id}}/{{camera}}/clip.mp4
  video_local: "{{root_dir}}{{sub_dir}}{{id}}_clip.mp4"
  thumb: /api/frigate/notifications/{{id}}/thumbnail.jpg
  image: /api/frigate/notifications/{{id}}/snapshot.jpg
  image_local: "{{root_dir}}{{sub_dir}}{{id}}_snapshot.jpg"
  gif: /api/frigate/notifications/{{review_id}}/review_preview.gif
  frigate_msg: !input in_frigate_msg
  title_image: !input in_title_image
  title_clip: !input in_title_clip
  action1: !input in_action1
  action2: !input in_action2
mode: parallel
max: 2
